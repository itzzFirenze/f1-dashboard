version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: f1-postgres
    environment:
      POSTGRES_DB: f1dashboard
      POSTGRES_USER: f1admin
      POSTGRES_PASSWORD: f1password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1admin -d f1dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: f1-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: f1dashboard
      DB_USERNAME: f1admin
      DB_PASSWORD: f1password
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: f1-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
