# ============================================
# F1 Dashboard - Default Profile (H2 Embedded)
# ============================================
spring:
  application:
    name: f1-dashboard
  mvc:
    pathmatch:
      matching-strategy: path_pattern_parser

  # H2 embedded database (desktop mode)
  datasource:
    url: jdbc:h2:file:${user.home}/.f1-dashboard/f1-data;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # Virtual threads (Java 21)
  threads:
    virtual:
      enabled: true

# Server configuration
server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# App-specific configuration
app:
  api:
    jolpica-base-url: https://api.jolpi.ca/ergast/f1
    openf1-base-url: https://api.openf1.org/v1
    sync-interval-hours: 6
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

# Logging
logging:
  level:
    com.f1dashboard: INFO
    org.springframework.security: WARN
